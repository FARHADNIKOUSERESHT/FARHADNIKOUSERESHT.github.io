<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="دکتر فرهاد نیکوسرشت - دکترای تخصصی فیزیولوژی ورزشی">
    <title>دکتر فرهاد نیکوسرشت | فیزیولوژی ورزشی</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navigation (همان قبلی) -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">دکتر فرهاد نیکوسرشت</div>
            <div class="menu">
                <a href="#" onclick="showSection('about')" class="nav-item active">درباره من</a>
                <a href="#" onclick="showSection('experience')" class="nav-item">سوابق علمی</a>
                <a href="#" onclick="showSection('internship')" class="nav-item">کارورزی و کارآموزی</a>
                <a href="#" onclick="showSection('publications')" class="nav-item">مقالات علمی</a>
                <a href="gallery.html" class="nav-item">گالری عکس</a>
                <a href="#" onclick="showSection('contact')" class="nav-item">ارتباط با من</a>
            </div>
        </div>
    </nav>

    <!-- Hero و بقیه بخش‌ها همان قبلی باقی می‌مانند -->

    <!-- Floating Sidebar Bottom Right -->
    <div class="floating-sidebar">
        <h3>خدمات تخصصی</h3>
        <a href="#" onclick="orderService('تمرین')" class="service-btn">
            <i class="fas fa-dumbbell"></i>
            سفارش برنامه تمرین ورزشی
        </a>
        <a href="#" onclick="orderService('تغذیه')" class="service-btn">
            <i class="fas fa-apple-alt"></i>
            سفارش برنامه تغذیه ورزشی
        </a>
    </div>

    <footer>
        <p>&copy; ۲۰۲۶ دکتر فرهاد نیکوسرشت - تمامی حقوق محفوظ است.</p>
    </footer>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.style.display = 'none';
            });
            document.getElementById(sectionId).style.display = 'block';
        }

        function orderService(type) {
            alert("در اینستاگرام پیام دهید\n\nبرای دریافت برنامه " + type + " ورزشی با من در ارتباط باشید.");
            window.open("https://www.instagram.com/farhadnikouseresht?igsh=OXU2dTNqcjk2OWNu", "_blank");
        }
    </script>
</body>
</html>
