<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="دکتر فرهاد نیکوسرشت - متخصص برنامه نویسی تمرین و تغذیه ورزشی">
    <title>دکتر فرهاد نیکوسرشت | فیزیولوژی ورزشی</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navigation - بسیار حرفه‌ای و تخصصی -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">دکتر فرهاد نیکوسرشت</div>
            <div class="menu">
                <a href="#" onclick="showSection('about')" class="nav-item active">درباره من</a>
                <a href="#" onclick="showSection('experience')" class="nav-item">سوابق علمی</a>
                <a href="#" onclick="showSection('publications')" class="nav-item">مقالات علمی</a>
                <a href="#" onclick="showSection('internship')" class="nav-item">کارورزی</a>
                
                <!-- بخش خدمات تخصصی -->
                <div class="dropdown">
                    <a href="#" class="nav-item main-service">خدمات تخصصی</a>
                    <div class="dropdown-content">
                        <a href="#contact" class="service-link">
                            <i class="fas fa-dumbbell"></i>
                            سفارش برنامه تمرین ورزشی
                        </a>
                        <a href="#contact" class="service-link">
                            <i class="fas fa-apple-alt"></i>
                            سفارش برنامه تغذیه ورزشی
                        </a>
                    </div>
                </div>

                <a href="gallery.html" class="nav-item">گالری</a>
                <a href="#" onclick="showSection('contact')" class="nav-item">ارتباط با من</a>
            </div>
        </div>
    </nav>

    <!-- بقیه بخش‌ها همان قبلی باقی می‌ماند (Hero, About, Experience و ...) -->
    <!-- ... (برای اختصار، بقیه کد را همان قبلی نگه دارید) ... -->

    <footer>
        <p>&copy; ۲۰۲۶ دکتر فرهاد نیکوسرشت - تمامی حقوق محفوظ است.</p>
    </footer>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.style.display = 'none';
            });
            document.getElementById(sectionId).style.display = 'block';

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
