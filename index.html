<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="دکتر فرهاد نیکوسرشت - دکترای تخصصی فیزیولوژی ورزشی">
    <title>دکتر فرهاد نیکوسرشت | فیزیولوژی ورزشی</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">دکتر فرهاد نیکوسرشت</div>
            <div class="menu">
                <!-- آیتم اصلی امکانات سایت -->
                <a href="#" onclick="toggleMenu()" class="nav-item main-menu">امکانات سایت</a>
            </div>
        </div>
    </nav>

    <!-- Full Menu (پنهان تا کلیک شود) -->
    <div id="fullMenu" class="full-menu">
        <div class="menu-items">
            <a href="#" onclick="showSection('about')" class="menu-link">درباره من</a>
            <a href="#" onclick="showSection('experience')" class="menu-link">سوابق علمی</a>
            <a href="#" onclick="showSection('internship')" class="menu-link">کارورزی و کارآموزی</a>
            <a href="#" onclick="showSection('publications')" class="menu-link">مقالات علمی</a>
            <a href="gallery.html" class="menu-link">گالری عکس</a>
            <a href="#" onclick="showSection('contact')" class="menu-link">ارتباط با من</a>
        </div>
    </div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>فرهاد نیکوسرشت</h1>
            <p class="subtitle">دکتری تخصصی (Ph.D) فیزیولوژی ورزشی</p>
            <p class="desc">استاد دانشگاه • فیزیولوژیست • پژوهشگر • متخصص فیزیولوژی ورزشی</p>
        </div>
        <div class="hero-image">
            <img src="profile.jpg" alt="دکتر فرهاد نیکوسرشت">
        </div>
    </section>

    <!-- Content Sections -->
    <div id="about" class="content-section active"> ... </div>
    <!-- بقیه بخش‌ها (experience, internship, publications, contact) را همان قبلی نگه دارید -->

    <footer>
        <p>&copy; ۲۰۲۶ دکتر فرهاد نیکوسرشت - تمامی حقوق محفوظ است.</p>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('fullMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.style.display = 'none';
            });
            document.getElementById(sectionId).style.display = 'block';
            // بستن منو بعد از کلیک
            document.getElementById('fullMenu').style.display = 'none';
        }
    </script>
</body>
</html>
